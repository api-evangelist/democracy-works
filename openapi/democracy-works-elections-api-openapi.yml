              byMail:
                idInstructions: 'Active military, permanent overseas voters, and confidential

                  electors are not required to provide a Photo ID when they vote by absentee ballot.

                  An indefinitely confined voter does not need to provide a copy of Photo ID.

                  Instead, the witness signature on the Absentee Ballot Certificate Envelope

                  satisfies the Photo ID requirement. For all other absentee voters, you will

                  need to provide a copy of your acceptable photo ID with your request. If you

                  have not previously provided a copy of photo ID, photo ID must accompany your

                  first application by mail. <br><br>These photo IDs are acceptable and can be

                  unexpired or expired after the date of the most recent general election: A Wisconsin

                  DOT-issued driver license, even if driving privileges are revoked or suspended;

                  A Wisconsin DOT-issued identification card; Military ID card issued by a U.S.

                  uniformed service; A U.S. passport. An identification card issued by a federally

                  recognized Indian tribe in Wisconsin; A photo identification card issued by

                  a Wisconsin accredited university or college that contains date of issuance,

                  expiration date no later than two years after issuance, and signature of student

                  (must be accompanied by a separate document that proves enrollment if the student

                  ID is expired).<br><br>These photo IDs are also acceptable for voting purposes,

                  but must be unexpired: A veteran''s photo identification card issued by the

                  Veterans Health Administration of the federal Department of Veterans Affairs;

                  A certificate of naturalization that was issued not earlier than two years before

                  the date of an election at which it is presented; A driving receipt issued by

                  Wisconsin DOT (valid for 45 days); An identification card receipt issued by

                  Wisconsin DOT (valid for 45 days);  a temporary identification card receipt

                  issued by Wisconsin DOT through the Identification Petition Process (IDPP) (valid

                  for 60 days).

                  '
