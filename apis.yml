description: >-
  Democracy Works is a nonprofit civic technology organization providing
  reliable voting guidance for federal, state, and local elections. Its
  Elections API powers voter-facing platforms, apps, reminders, and
  outreach campaigns with comprehensive election and election-authority
  data keyed to Open Civic Data IDs.
apis:
  - aid: democracy-works:elections-api
    name: Democracy Works Elections API
    description: >-
      The Democracy Works Elections API provides reliable voting
      guidance for all levels of elections, from federal to local. It
      exposes elections, election authorities, state-level guidance, and
      bulk export endpoints used to inspire civic participation.
